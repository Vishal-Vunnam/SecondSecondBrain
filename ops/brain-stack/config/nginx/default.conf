server {
  listen 80;
  server_name _;
  resolver 127.0.0.11 valid=10s ipv6=off;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location = /health/console {
    access_log off;
    return 204;
  }

  location = /health/couchdb {
    access_log off;
    proxy_pass http://couchdb:5984/_up;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location = /health/ollama {
    access_log off;
    proxy_intercept_errors on;
    set $ollama_upstream http://ollama:11434;
    proxy_pass $ollama_upstream/api/tags;
    proxy_set_header Host $host;
    error_page 500 502 503 504 = @service_offline;
  }

  location = /health/anythingllm {
    access_log off;
    proxy_intercept_errors on;
    set $anythingllm_upstream http://anythingllm:3001;
    proxy_pass $anythingllm_upstream/;
    proxy_set_header Host $host;
    error_page 500 502 503 504 = @service_offline;
  }

  location @service_offline {
    access_log off;
    return 503;
  }
}
