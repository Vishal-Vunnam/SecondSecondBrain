server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location = /health/console {
    access_log off;
    return 204;
  }

  location = /health/couchdb {
    access_log off;
    proxy_pass http://couchdb:5984/_up;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location = /health/ollama {
    access_log off;
    proxy_pass http://ollama:11434/api/tags;
    proxy_set_header Host $host;
  }

  location = /health/anythingllm {
    access_log off;
    proxy_pass http://anythingllm:3001/;
    proxy_set_header Host $host;
  }
}
