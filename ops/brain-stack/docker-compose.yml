name: second-brain

services:
  brain-console:
    image: second-brain-console:local
    build:
      context: ../..
      dockerfile: ops/brain-stack/Dockerfile.console
    container_name: brain-console
    restart: unless-stopped
    ports:
      - "${TAILSCALE_IP:-127.0.0.1}:${BRAIN_CONSOLE_PORT:-8080}:80"
    environment:
      TAILSCALE_IP: "${TAILSCALE_IP:-127.0.0.1}"
      TERMINAL_PORT: "${TERMINAL_PORT:-7681}"
      VAULT_ROOT: /vault
      BRAIN_CONSOLE_PASSWORD: "${BRAIN_CONSOLE_PASSWORD:-}"
      BRAIN_CONSOLE_SESSION_SECRET: "${BRAIN_CONSOLE_SESSION_SECRET:-}"
      COOKIE_SECURE: "${COOKIE_SECURE:-false}"
      VISHAL_AI_INTAKE_TOKEN: "${VISHAL_AI_INTAKE_TOKEN:-}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      GEMINI_TASK_MODEL: "${GEMINI_TASK_MODEL:-gemini-2.5-flash}"
    volumes:
      - ./vault:/vault
    depends_on:
      - couchdb
      - syncthing
    networks:
      - brain

  caddy:
    image: caddy:2.8-alpine
    container_name: brain-caddy
    profiles:
      - public
    restart: unless-stopped
    network_mode: host
    environment:
      PUBLIC_HOSTNAME: "${PUBLIC_HOSTNAME:-ai.vishalvunnam.com}"
      TAILSCALE_IP: "${TAILSCALE_IP:-127.0.0.1}"
      BRAIN_CONSOLE_PORT: "${BRAIN_CONSOLE_PORT:-8080}"
      TERMINAL_PORT: "${TERMINAL_PORT:-7681}"
    volumes:
      - ./config/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/caddy:/data
      - ./data/caddy-config:/config
    depends_on:
      - brain-console

  syncthing:
    image: lscr.io/linuxserver/syncthing:latest
    container_name: brain-syncthing
    restart: unless-stopped
    environment:
      PUID: "${HOST_UID:-1000}"
      PGID: "${HOST_GID:-1000}"
      TZ: "${TZ:-America/New_York}"
    ports:
      - "${TAILSCALE_IP:-127.0.0.1}:${SYNCTHING_PORT:-8384}:8384"
      - "${TAILSCALE_IP:-127.0.0.1}:22000:22000/tcp"
      - "${TAILSCALE_IP:-127.0.0.1}:21027:21027/udp"
    volumes:
      - ./data/syncthing:/config
      - ./vault:/vault
    networks:
      - brain

  couchdb:
    image: couchdb:3.5
    container_name: brain-couchdb
    restart: unless-stopped
    user: "5984:5984"
    environment:
      COUCHDB_USER: "${COUCHDB_USER:?set COUCHDB_USER in .env}"
      COUCHDB_PASSWORD: "${COUCHDB_PASSWORD:?set COUCHDB_PASSWORD in .env}"
      COUCHDB_SECRET: "${COUCHDB_SECRET:?set COUCHDB_SECRET in .env}"
    ports:
      - "${TAILSCALE_IP:-127.0.0.1}:${COUCHDB_PORT:-5984}:5984"
    volumes:
      - ./data/couchdb:/opt/couchdb/data
      - ./config/couchdb/zz-livesync.ini:/opt/couchdb/etc/local.d/zz-livesync.ini:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -u \"$${COUCHDB_USER}:$${COUCHDB_PASSWORD}\" http://127.0.0.1:5984/_up >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
    networks:
      - brain

  ollama:
    image: ollama/ollama:latest
    container_name: brain-ollama
    profiles:
      - ai
    restart: unless-stopped
    volumes:
      - ./data/ollama:/root/.ollama
    ports:
      - "127.0.0.1:${OLLAMA_PORT:-11434}:11434"
    expose:
      - "11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
    networks:
      - brain

  anythingllm:
    image: mintplexlabs/anythingllm:latest
    container_name: brain-anythingllm
    profiles:
      - ai
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN
    environment:
      STORAGE_DIR: /app/server/storage
    ports:
      - "${TAILSCALE_IP:-127.0.0.1}:${ANYTHINGLLM_PORT:-3001}:3001"
    volumes:
      - ./data/anythingllm:/app/server/storage
      - ./.anythingllm.env:/app/server/.env
      - ./vault:/vault
    depends_on:
      - ollama
    networks:
      - brain

networks:
  brain:
    name: second-brain
